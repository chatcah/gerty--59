<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classification Dashboard</title>
    <!-- นำเข้า Tailwind CSS สำหรับการออกแบบหน้าจอที่สวยงาม -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* สไตล์เพิ่มเติมสำหรับปรับแต่งแนว Canvas ของเว็บแคมให้ดูละมุน */
        #webcam-container canvas {
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100% !important;
            height: auto !important;
            max-width: 320px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-200 py-6 px-4 shadow-xs text-center">
        <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">Teachable Machine AI</h1>
        <p class="text-slate-500 mt-1 text-sm">ระบบทำนายวัตถุจากกล้องเว็บแคมอัตโนมัติ (อัปเดตทุกๆ 3 วินาที)</p>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-4xl mx-auto my-8 p-4 w-full flex-grow">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <!-- Left Side: Control & Webcam View -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center space-y-6">
                <h2 class="text-lg font-semibold text-slate-700">กล้องเว็บแคม (Webcam Feed)</h2>
                
                <!-- Webcam Slot -->
                <div id="webcam-container" class="bg-slate-100 rounded-2xl p-4 min-h-[240px] flex items-center justify-center border-2 border-dashed border-slate-200">
                    <span id="placeholder-text" class="text-slate-400 text-sm">กดปุ่มเริ่มทำงานเพื่อเปิดกล้อง</span>
                </div>

                <!-- Action Button -->
                <button type="button" onclick="init()" id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-xl transition duration-200 ease-in-out shadow-md hover:shadow-lg focus:outline-hidden transform hover:-translate-y-0.5">
                    เริ่มการทำงานระบบ
                </button>
            </div>

            <!-- Right Side: Classification Results -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full min-h-[350px]">
                <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3">
                    <h2 class="text-lg font-semibold text-slate-700">ผลลัพธ์การวิเคราะห์ (Results)</h2>
                    <!-- แสดงสัญลักษณ์สถานะว่าอัปเดตทุก 3 วินาที -->
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800 animate-pulse">
                        Interval: 3s
                    </span>
                </div>

                <!-- Labels Container -->
                <div id="label-container" class="space-y-4 flex-grow flex flex-col justify-center">
                    <p class="text-slate-400 text-sm text-center">รอการวิเคราะห์ข้อมูล...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Section -->
    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-200 bg-white">
        Powered by TensorFlow.js & Teachable Machine
    </footer>

    <!-- Scripts Section -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/uFT20_LlMZ/";
        let model, webcam, labelContainer, maxPredictions;
        let predictInterval; // ตัวแปรสำหรับคุมเวลา 3 วินาที

        async function init() {
            // ซ่อนข้อความแจ้งเตือนและปิดปุ่มป้องกันการกดซ้ำ
            document.getElementById("placeholder-text").style.display = "none";
            const startBtn = document.getElementById("start-btn");
            startBtn.disabled = true;
            startBtn.innerText = "ระบบกำลังทำงาน...";
            startBtn.className = "w-full bg-emerald-500 text-white font-medium py-3 px-6 rounded-xl cursor-not-allowed shadow-md";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลด AI Model
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่าเว็บแคม
            const flip = true; 
            webcam = new tmImage.Webcam(320, 320, flip); // ขยายขนาดวิดีโอให้ชัดเจนยิ่งขึ้น
            await webcam.setup(); 
            await webcam.play();
            
            // นำวิดีโอเข้าหน้าจอและเริ่มวนลูปดึงภาพจากกล้องมาแสดงผล
            document.getElementById("webcam-container").innerHTML = ""; // ล้างข้อมูลเดิมออกก่อน
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            window.requestAnimationFrame(loop);

            // เตรียมพื้นที่แสดงผล Progress Bar ให้สวยงาม
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // ล้างค่าเริ่มต้นตัวอักษรบอกสถานะ
            for (let i = 0; i < maxPredictions; i++) {
                const element = document.createElement("div");
                element.className = "space-y-1";
                labelContainer.appendChild(element);
            }

            // ทำการทำนายครั้งแรกทันที
            predict();

            // 🌟 จุดสำคัญ: ตั้งเวลาให้เรียกฟังก์ชันทำนาย (predict) ทุกๆ 3000 มิลลิวินาที (3 วินาที)
            predictInterval = setInterval(predict, 3000);
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมภาพจากเว็บแคมขึ้นหน้าจอแบบ real-time ลื่นๆ
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันทำนายที่จะถูกสั่งให้รันทุกๆ 3 วินาที
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0);

                // สร้างดีไซน์ Progress Bar แยกส่วนชื่อและแถบความมั่นใจ (Confidence Score)
                const classPrediction = `
                    <div class="flex justify-between text-sm font-medium text-slate-700">
                        <span>${className}</span>
                        <span class="text-indigo-600 font-semibold">${percentage}%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 h-3 rounded-full transition-all duration-500 ease-out" style="width: ${percentage}%"></div>
                    </div>
                `;
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
